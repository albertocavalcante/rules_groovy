name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly macOS smoke (Mondays 03:17 UTC). macOS minutes are 10x
    # linux on GitHub Actions; per-PR macOS dominated 67% of the CI
    # budget for marginal extra signal. Weekly cron catches platform
    # regressions within 7 days, well inside any downstream feedback
    # loop. See ISSUE-078 and
    # rules_groovy-plan/notes/ci-cost-reduction-2026-05-31.md.
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      run_advisory:
        description: 'Run Bazel 7.x / 8.x advisory cells'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Per rules_groovy-plan/decisions/ADR-005-bazel-9-baseline.md:
# Bazel 9.x is the supported baseline (required, blocks merges).
# Bazel 7.x and 8.x cells are advisory — they live in build-advisory
# below and run only on workflow_dispatch with `run_advisory=true`.
# Before tagging any release, fire workflow_dispatch with
# `run_advisory=true` to exercise the full historical matrix; the
# recipe is documented in CONTRIBUTING.md.

jobs:
  build-linux:
    # Required: Bazel 9 + bzlmod + ubuntu on every event (push, PR,
    # cron, dispatch). The supported baseline.
    name: "bzlmod / ubuntu-latest / Bazel 9.x"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      # ISSUE-078: cache the Bazel disk cache keyed on MODULE.bazel.lock.
      # MODULE.bazel.lock rarely changes between PRs; cache hits trim
      # cold-start from ~30-60s to ~5s and skip the SDK + Maven artifact
      # downloads. `restore-keys` falls back to the most recent
      # bazel-disk-linux-* cache when the exact lock hash misses, letting
      # Bazel re-resolve only what's actually outdated.
      - name: Cache Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-linux-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: |
            bazel-disk-linux-

      # Chapter 9 of the v0.1.0 release narrative: --lockfile_mode=error
      # turns silent MODULE.bazel.lock mutations into hard failures. Pairs
      # with the module extension's `extension_metadata(reproducible = True)`
      # claim (chapter 5) — if the extension would re-resolve at build time
      # and rewrite the lockfile, CI fails instead of papering over it.
      - name: Build (bzlmod)
        run: bazel build --config=bzlmod --lockfile_mode=error --disk_cache="$HOME/.cache/bazel-disk" //...
        env:
          USE_BAZEL_VERSION: '9.x'

      # Chapter 9 — execute-time coverage. Compile-time correctness was
      # established by the chapter-4 hermetic-actions rewrite; this step
      # actually runs //src/test/groovy/lib:GroovyLibTest (and any future
      # `groovy_test` targets) on the JVM.
      - name: Test (bzlmod)
        run: bazel test --config=bzlmod --lockfile_mode=error --disk_cache="$HOME/.cache/bazel-disk" //...
        env:
          USE_BAZEL_VERSION: '9.x'

  build-macos:
    # macOS is 10x the per-minute cost on GitHub Actions. Run weekly
    # (Monday 03:17 UTC) plus on manual workflow_dispatch (pre-release
    # confidence). Never on PRs or individual main pushes — Darwin
    # regressions surface within 7 days, well inside any downstream
    # consumer feedback loop. See ISSUE-078.
    name: "bzlmod / macos-latest / Bazel 9.x"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      # No disk cache on macOS: the weekly cadence makes the hit rate
      # too low to be worth a separate cache key.
      - name: Build (bzlmod)
        run: bazel build --config=bzlmod --lockfile_mode=error //...
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: Test (bzlmod)
        run: bazel test --config=bzlmod --lockfile_mode=error //...
        env:
          USE_BAZEL_VERSION: '9.x'

  build-advisory:
    # ADR-005 keeps Bazel 9 as the only supported target. The 7.x / 8.x
    # cells exist for regression signal but were red on PR #31 and
    # nobody acts on them — at ~$0.09 per push * ~125 pushes per month
    # that's ~$11/month for zero acted-on coverage. Gate them behind
    # manual dispatch so they can be fired before a release without
    # spending per-PR. See ISSUE-078.
    name: "bzlmod / ${{ matrix.os }} / Bazel ${{ matrix.bazel-version }} (advisory)"
    if: github.event_name == 'workflow_dispatch' && inputs.run_advisory
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, bazel-version: '8.x' }
          - { os: macos-latest,  bazel-version: '8.x' }
          - { os: ubuntu-latest, bazel-version: '7.x' }
          - { os: macos-latest,  bazel-version: '7.x' }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build (bzlmod)
        run: bazel build --config=bzlmod --lockfile_mode=error //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel-version }}

      - name: Test (bzlmod)
        run: bazel test --config=bzlmod --lockfile_mode=error //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel-version }}

  examples:
    # Per-example downstream-integration tests. Each `examples/<name>/`
    # is its own Bazel module that depends on `rules_groovy` via
    # `local_path_override`. Building from inside each directory
    # exercises the canonical public `load("@rules_groovy//groovy:defs.bzl",
    # ...)` path the way a real downstream consumer would.
    #
    # ISSUE-078: needs build-linux (the always-on baseline) rather than
    # the old monolithic `build` job that was split this PR. Per-example
    # disk cache keyed on each example's own MODULE.bazel — the rules
    # repo's MODULE.bazel.lock is irrelevant downstream.
    name: "examples / ${{ matrix.example }}"
    runs-on: ubuntu-latest
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        example:
          - minimal_library
          - stdlib_only_test
          - junit4_test
          - junit5_test
          - spock_test
          - maven_dep
          - mixed_jvm
          - binary
          - multi_version
          - codenarc
          - reproducibility
          - long_classpath
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel disk cache (per example)
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-examples-${{ matrix.example }}-${{ hashFiles(format('examples/{0}/MODULE.bazel', matrix.example)) }}
          restore-keys: |
            bazel-disk-examples-${{ matrix.example }}-
            bazel-disk-examples-

      - name: Build + test example
        working-directory: examples/${{ matrix.example }}
        run: |
          bazel build --lockfile_mode=off --disk_cache="$HOME/.cache/bazel-disk" //...
          # Bazel test returns exit 4 ("no test targets found") for
          # `minimal_library`, `binary`, and `long_classpath`. Tolerate
          # that exit code specifically; let any other non-zero failure
          # bubble up.
          set +e
          bazel test --lockfile_mode=off --disk_cache="$HOME/.cache/bazel-disk" --test_output=errors //...
          status=$?
          if [ $status -eq 4 ]; then
            echo "Example has no test targets; build alone is sufficient."
            exit 0
          fi
          exit $status
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: multi_version — exercise all three SDK selections
        if: matrix.example == 'multi_version'
        working-directory: examples/multi_version
        run: |
          set -euo pipefail
          # The default `bazel test //...` step above already covered
          # the no-flag case (`:is_default`-gated registration -> Groovy
          # 4.0.32). Here we exercise the explicit-value path for the
          # other two SDKs end-to-end (compile + run) so the per-version
          # selection is verified at runtime, not just at analysis time.
          bazel test --lockfile_mode=off --disk_cache="$HOME/.cache/bazel-disk" --test_output=errors \
            --@rules_groovy//groovy/config_settings:groovy_version=3.0.25 //...
          bazel test --lockfile_mode=off --disk_cache="$HOME/.cache/bazel-disk" --test_output=errors \
            --@rules_groovy//groovy/config_settings:groovy_version=2.5.23 //...
        env:
          USE_BAZEL_VERSION: '9.x'

  buildifier:
    # ISSUE-069: lint + format check for Starlark / BUILD files. Pre-1.0
    # is when style is cheapest to enforce — gating now keeps `groovy/`,
    # `tests/`, `MODULE.bazel`, `REPO.bazel`, and `docs/BUILD.bazel`
    # uniformly buildifier-clean before v0.1.0 ships.
    #
    # Scope notes:
    #   * `examples/` is intentionally excluded. Each example is its own
    #     downstream module with its own (potentially less strict) style.
    #     Locking them under the rules repo's buildifier policy would
    #     couple downstream contributor onboarding to our hygiene bar.
    #   * Buildifier ships as a single static binary from
    #     bazelbuild/buildtools. Pinned by tag + SHA256 (see the install
    #     step) — no Bazel target, no setup action, no transitive
    #     dependency. The download is verified before exec.
    name: buildifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Buildifier (pinned v8.5.1)
        env:
          # Pinned to the v8.5.1 release (latest as of 2026-01-30).
          # SHA256 captured from
          #   curl -sL .../buildifier-linux-amd64 | sha256sum
          # on 2026-05-18. Refresh both values together when bumping.
          BUILDIFIER_VERSION: v8.5.1
          BUILDIFIER_SHA256: 887377fc64d23a850f4d18a077b5db05b19913f4b99b270d193f3c7334b5a9a7
        run: |
          set -euo pipefail
          url="https://github.com/bazelbuild/buildtools/releases/download/${BUILDIFIER_VERSION}/buildifier-linux-amd64"
          curl -fsSL -o /usr/local/bin/buildifier "$url"
          echo "${BUILDIFIER_SHA256}  /usr/local/bin/buildifier" | sha256sum -c -
          chmod +x /usr/local/bin/buildifier
          buildifier --version

      - name: Buildifier check
        # Explicit paths instead of `-r .` so `examples/` is excluded.
        # `--mode=check` exits non-zero on any required reformat; combined
        # with `--lint=warn` it also surfaces (and fails on) lint warnings.
        # Keep this list in sync with the top-level Starlark layout.
        run: |
          buildifier \
            --mode=check \
            --lint=warn \
            -r groovy tests docs \
            MODULE.bazel REPO.bazel

  docs-regen-check:
    # Chapter 8 of the v0.1.0 release narrative: rule docstrings in
    # //groovy/*.bzl are the source of truth. //docs runs Stardoc to
    # emit one markdown file per public .bzl; the generated files are
    # committed under docs/. This job regenerates them and fails the
    # PR if the committed copy diverged from what Stardoc would emit.
    name: docs regen check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: Cache Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-docs-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: |
            bazel-disk-docs-

      - name: Regenerate docs
        run: |
          bazel build --lockfile_mode=error --disk_cache="$HOME/.cache/bazel-disk" //docs:all
          # Stardoc outputs land in bazel-bin/docs/. Overwrite the
          # committed copies under docs/ and let `git diff` decide.
          cp bazel-bin/docs/rules-public.md docs/rules-public.md
          cp bazel-bin/docs/rules-toolchain.md docs/rules-toolchain.md
          cp bazel-bin/docs/rules-extension.md docs/rules-extension.md
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: Verify docs are up to date
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::Stardoc output diverged from the committed copies under docs/."
            echo "Run 'bazel build //docs:all' locally and copy the outputs from bazel-bin/docs/."
            exit 1
          fi
