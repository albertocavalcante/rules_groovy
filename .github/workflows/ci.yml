name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Per rules_groovy-plan/decisions/ADR-005-bazel-9-baseline.md:
# Bazel 9.x is the supported baseline (required, blocks merges).
# Bazel 7.x and 8.x cells are advisory — they run on every PR for
# regression signal but don't gate merges. WORKSPACE is gone in
# v0.1.0 (chapter 7); only bzlmod cells remain.

jobs:
  build:
    name: "${{ matrix.mode }} / ${{ matrix.os }} / Bazel ${{ matrix.bazel-version }}${{ matrix.advisory && ' (advisory)' || '' }}"
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.advisory }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Required: Bazel 9 + bzlmod (the supported baseline).
          - { os: ubuntu-latest, bazel-version: '9.x', mode: bzlmod, advisory: false }
          - { os: macos-latest,  bazel-version: '9.x', mode: bzlmod, advisory: false }
          # Advisory: older Bazel + bzlmod.
          - { os: ubuntu-latest, bazel-version: '8.x', mode: bzlmod, advisory: true }
          - { os: macos-latest,  bazel-version: '8.x', mode: bzlmod, advisory: true }
          - { os: ubuntu-latest, bazel-version: '7.x', mode: bzlmod, advisory: true }
          - { os: macos-latest,  bazel-version: '7.x', mode: bzlmod, advisory: true }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build (bzlmod)
        if: matrix.mode == 'bzlmod'
        run: bazel build --config=bzlmod //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel-version }}

  docs-regen-check:
    # Chapter 8 of the v0.1.0 release narrative: rule docstrings in
    # //groovy/*.bzl are the source of truth. //docs runs Stardoc to
    # emit one markdown file per public .bzl; the generated files are
    # committed under docs/. This job regenerates them and fails the
    # PR if the committed copy diverged from what Stardoc would emit.
    name: docs regen check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: Regenerate docs
        run: |
          bazel build //docs:all
          # Stardoc outputs land in bazel-bin/docs/. Overwrite the
          # committed copies under docs/ and let `git diff` decide.
          cp bazel-bin/docs/rules-public.md docs/rules-public.md
          cp bazel-bin/docs/rules-toolchain.md docs/rules-toolchain.md
          cp bazel-bin/docs/rules-extension.md docs/rules-extension.md
        env:
          USE_BAZEL_VERSION: '9.x'

      - name: Verify docs are up to date
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::Stardoc output diverged from the committed copies under docs/."
            echo "Run 'bazel build //docs:all' locally and copy the outputs from bazel-bin/docs/."
            exit 1
          fi
