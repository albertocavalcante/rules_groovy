name: Feature request
description: Propose a new rule, attribute, or behavior.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim:

        - [`docs/rules-public.md`](../blob/main/docs/rules-public.md),
          [`docs/rules-toolchain.md`](../blob/main/docs/rules-toolchain.md),
          and [`docs/rules-extension.md`](../blob/main/docs/rules-extension.md)
          for the current public surface.
        - [`CHANGELOG.md`](../blob/main/CHANGELOG.md) — it may already be
          planned or shipped.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do? Concrete first, abstractions second.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed rule, attribute, or behavior
      description: A sketch of the user-facing API change. BUILD or MODULE.bazel snippets welcome.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other rulesets or workarounds you looked at. For example
        `rules_kotlin`, `rules_scala`, `rules_jvm_external`,
        hand-rolled `genrule`s. Why didn't they fit?
    validations:
      required: true

  - type: input
    id: upstream-link
    attributes:
      label: Related upstream issue (optional)
      description: Link to a `bazelbuild/rules_groovy` issue if this tracks one.
      placeholder: "https://github.com/bazelbuild/rules_groovy/issues/..."
    validations:
      required: false
